<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=api/v1/">
    <title>Smart Campus API</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2933;
        }

        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 64px 24px;
        }

        h1 {
            margin-bottom: 12px;
        }

        p {
            line-height: 1.6;
        }

        a {
            color: #0b6ed0;
        }

        .card {
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
    </style>
    <script>
        window.location.replace("api/v1/");
    </script>
</head>
<body>
<main>
    <div class="card">
        <h1>Smart Campus API</h1>
        <p>Redirecting to the API discovery endpoint.</p>
        <p>If the redirect does not happen automatically, open <a href="api/v1/">/api/v1/</a>.</p>
    </div>
</main>
</body>
</html>
